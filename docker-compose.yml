# Docker Compose configuration for frontend and backend
version: '3.8'

services:
  frontend:
    build:
      context: ./
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    networks:
      - app-network

  backend:
    build:
      context: ./
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge